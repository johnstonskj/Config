"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в”Ңв”Җв”Ө ](dimmed)\
$directory\
$git_branch\
$git_status\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$docker_context\
$aws\
$gcloud\
[в”ң](dimmed)\
$fill\
[в”Ө ](dimmed)\
$status\
$sudo\
$shlvl\
$jobs\
$cmd_duration\
$time\
[в”Ӯ](dimmed)\
$line_break\
$character"""

add_newline = true
continuation_prompt = "[в””в”Ҳв”Ҳ](dimmed)"

[fill]
symbol = "в”Ҳ"
style = "dimmed"

[character]
success_symbol = '[в””в”Җ](dimmed) [вқҜ](bold green)'
error_symbol = '[в””в”Җ](dimmed) [вқҜ](bold red)'

[status]
disabled = false
format = '[$symbol( $common_meaning)( $signal_name)( $signal_number)( $maybe_int) ]($style)'
style = 'fg:red bg:color_bg'
success_style = 'bold fg:green bg:color_bg'
symbol = 'вңҳ'
map_symbol = false
pipestatus = true
pipestatus_format = '[$pipestatus]($style)'

[time]
disabled = false
format = '[вҸІ](bold) [$time]($style) '
time_format = '%T'
utc_time_offset = '-5'

[aws]
symbol = "[оҢҪ](fg:orange) "
style = "orange"

[gcloud]
symbol = "[оҢҪ](fg:blue) "
format = 'on [$symbol$account(@$domain)(\($project\))]($style) '
style = "blue"

[battery]
full_symbol = "п•ё"
charging_symbol = "п–ғ"
discharging_symbol = "п–Ӯ"

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 10
style = "bold red"

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 30
style = "bold yellow"

[conda]
symbol = "п„Ң "
disabled = true

[docker_context]
symbol = "пҢҲ "
only_with_files = true

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
symbol = "пҗҳ "

[golang]
symbol = "оҳ§ "

# [haskell]
# symbol = "оҳҹ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[memory_usage]
symbol = "пЎҡ "
style = "bold dimmed green"
threshold = 75
disabled = false

[nim]
symbol = "пҡӨ "

[nix_shell]
symbol = "пӢң "

[nodejs]
symbol = "оүҸ "

[package]
symbol = "пЈ– "

[php]
symbol = "оҳҲ "

[python]
symbol = "оҳҶ "

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "пҖ“ "

[custom.racket]
description = "Racket"
symbol = "рққә "
style = "bold blue"
extensions = ["rkt", "scrbl"]
command = """racket --version | cut -d "v" -f 2 | cut -d " " -f 1"""
format = "via [$symbol($output )]($style) "

[custom.os-macos]
symbol = "оң‘ "
when = """ test `uname -s` = "Darwin" """

[custom.os-linux]
symbol = "оң’ "
when = """ test `uname -s` = "Linux" """

[custom.os-windows]
symbol = "оңҸ "
when = """ test `uname -s` = "Windows" """

